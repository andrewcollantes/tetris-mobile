<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

    <!-- TITLE -->
    <section id="titleScreen" class="screen active">
        <div class="menu-card">
            <h1>MOBILE TETRIS</h1>
            <div class="menu-buttons">
                <button id="playMenuBtn">Play</button>
                <button id="leaderboardMenuBtn">Leaderboard</button>
            </div>
        </div>
    </section>

    <!-- GAME -->
    <section id="gameScreen" class="screen">
        <div class="game-layout">

            <div class="top-row">
                <div class="mini-stats">
                    <div class="stat-box"><span>Score</span><strong id="score">0</strong></div>
                    <div class="stat-box"><span>Lines</span><strong id="lines">0</strong></div>
                    <div class="stat-box"><span>Level</span><strong id="level">1</strong></div>
                </div>

                <div class="next-mini-box">
                    <span>Next</span>
                    <canvas id="nextPiece" width="80" height="80"></canvas>
                </div>
            </div>

            <div class="board-wrap">
                <canvas id="tetris"></canvas>
                <div id="gameOverText" class="game-over hidden">GAME OVER</div>
            </div>

            <!-- CONTROLS -->
            <div class="mobile-controls">
                <div class="dpad">
                    <button id="rotateBtn">▲</button>
                    <button id="leftBtn">◀</button>
                    <button disabled>•</button>
                    <button id="rightBtn">▶</button>
                    <button id="downBtn">▼</button>
                </div>

                <div>
                    <button id="dropBtn">DROP</button>
                    <button id="restartBtn">RESTART</button>
                    <button id="menuBtn">MENU</button>
                </div>
            </div>

        </div>
    </section>

    <!-- LEADERBOARD -->
    <section id="leaderboardScreen" class="screen">
        <div class="menu-card">
            <h1>LEADERBOARD</h1>
            <div id="leaderboardList"></div>
            <button id="backToMenuBtn">Back</button>
        </div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
