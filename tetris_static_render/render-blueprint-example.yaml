services:
  - type: static_site
    name: neon-tetris
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    branch: main
    rootDir: tetris-static
    buildCommand: ""
    staticPublishPath: .

  - type: web
    name: your-second-flask-app
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    branch: main
    rootDir: second-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
